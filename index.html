<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Training</title>
  <style>
    :root {
      --bg: #241a15;
      --bg-soft: #2f231c;
      --tan: #c9b7ad;
      --muted: #9c8d84;
      --accent: #7ED9A0;
      --accent-soft: #e8f7f0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #2f231c 0%, #241a15 60%);
      color: var(--tan);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      gap: 40px;
    }
    header { text-align: center; }
    header .eyebrow {
      color: var(--accent);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 0.78rem;
      font-weight: 600;
      margin-bottom: 12px;
    }
    header h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      color: #fff;
      font-weight: 700;
      line-height: 1.15;
    }
    header p {
      margin-top: 12px;
      color: var(--muted);
      font-size: 1rem;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 760px;
    }
    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      background: var(--bg-soft);
      border: 1px solid rgba(201, 183, 173, 0.18);
      border-radius: 18px;
      padding: 32px 28px;
      color: var(--tan);
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      overflow: hidden;
    }
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, rgba(126, 217, 160, 0.08), transparent 55%);
      opacity: 0;
      transition: opacity 0.18s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 18px 40px -20px rgba(0, 0, 0, 0.7);
    }
    .card:hover::after { opacity: 1; }
    .card .day-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: var(--accent-soft);
      color: #1c3b2a;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 22px;
    }
    .card h2 {
      color: #fff;
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .card p {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .card .go {
      margin-top: 22px;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .card .go span { transition: transform 0.18s ease; }
    .card:hover .go span { transform: translateX(4px); }
    footer {
      color: var(--muted);
      font-size: 0.82rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <div class="eyebrow">USIM Class</div>
    <h1>Claude Code Training</h1>
    <p>Choose a day to open its slides.</p>
  </header>

  <main class="cards">
    <a class="card" href="day1.html">
      <div class="day-num">1</div>
      <h2>Day 1</h2>
      <p>Getting started with Claude Code &mdash; foundations and first workflows.</p>
      <span class="go">Open slides <span>&rarr;</span></span>
    </a>

    <a class="card" href="day2.html">
      <div class="day-num">2</div>
      <h2>Day 2</h2>
      <p>Building on Day 1 &mdash; deeper techniques and hands-on practice.</p>
      <span class="go">Open slides <span>&rarr;</span></span>
    </a>
  </main>

  <footer>Claude Code Training &middot; USIM</footer>
</body>
</html>
